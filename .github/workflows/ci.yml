name: CI

# Render auto-deploys `main` on push. This workflow only runs tests, so you get
# a red/green signal on every branch and pull request before merging to main.
on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e . pytest
      - name: Run tests
        run: pytest -q
      - name: Smoke-run the matcher (offline cache)
        run: python -m matcher.cli run
