# Render Blueprint — create the service with: New + > Blueprint > pick this repo.
services:
  - type: web
    name: teencare-mentor-matcher
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /_stcore/health
    branch: main             # only this branch deploys; feature branches do not
    autoDeploy: true         # Render auto-deploys on push to `main`
    envVars:
      - key: OPENAI_MODEL
        value: gpt-4o-mini
      - key: OPENAI_API_KEY  # set in the Render dashboard; enables LLM enrichment
        sync: false
      - key: SUPABASE_URL    # set in the dashboard; persists enrichment across redeploys
        sync: false
      - key: SUPABASE_KEY    # Supabase service-role key (secret)
        sync: false
